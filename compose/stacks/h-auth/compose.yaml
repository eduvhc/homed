services:
  # ─── one-shot: gera oidc-issuer.pem RSA keypair (idempotente) ───
  # Authelia precisa de RSA key para assinar tokens OIDC. Cada máquina
  # gera a sua na primeira corrida — clients OIDC re-handshake quando
  # o JWKS muda. Substitui o antigo SCP secrets/keys/oidc-issuer.pem.
  h-auth-key-bootstrap:
    image: authelia/authelia:4.39.20
    container_name: h-auth-key-bootstrap
    restart: "no"
    volumes:
      - ./config:/config
    entrypoint: ["/bin/sh", "-c", "set -eu; if [ -s /config/oidc-issuer.pem ]; then echo 'skip: /config/oidc-issuer.pem já existe'; else authelia crypto pair rsa generate --directory /config --file.private-key oidc-issuer.pem --file.public-key oidc-issuer.public.pem && echo 'oidc-issuer keypair gerado'; fi"]

  h-auth:
    image: authelia/authelia:4.39.20
    container_name: h-auth
    restart: unless-stopped
    depends_on:
      h-auth-key-bootstrap: { condition: service_completed_successfully }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    security_opt: [ no-new-privileges:true ]
    env_file:
      - ../../../secrets/h-auth.env     # decifrado por `task up` (sops -> plaintext, 600)
    environment:
      TZ: Europe/Lisbon
      # Activa os 2 filtros de config (Authelia aplica-os por ordem):
      #   expand-env: substitui ${VAR} via os.Expand — usado para VALKEY_PASSWORD
      #   template:   executa {{ secret "..." }} — carrega o oidc-issuer.pem
      # Source: internal/configuration/{koanf_provider_filtered_file.go,const.go}
      X_AUTHELIA_CONFIG_FILTERS: expand-env,template
    volumes:
      - ./config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Sem host port: h-auth é o gateway de auth, não precisa de acesso direto.
    # Acesso normal via auth.iedora.com → Caddy → h-auth (Caddy routing por Host header).
    # Para testes locais: `curl -H "Host: auth.iedora.com" http://localhost:18080/...`
    networks:
      - edge
      - internal           # para chegar a h-valkey
    labels:
      # Em OrbStack usa http:// (TLS termina na CF em prod). Em prod: caddy: auth.iedora.com
      caddy: http://auth.iedora.com
      caddy.reverse_proxy: "{{upstreams 9091}}"

networks:
  edge:
    external: true
  internal:
    external: true
