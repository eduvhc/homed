; h-forgejo · app.ini — source-of-truth da config.
; Env vars no compose ficam só para o que precisa de substituição em runtime
; (passwords vindas de env_file, etc). Docs: https://forgejo.org/docs/latest/admin/config-cheat-sheet/

APP_NAME = forge · iedora
RUN_MODE = prod
RUN_USER = git

[server]
DOMAIN = forge.iedora.com
ROOT_URL = https://forge.iedora.com/
HTTP_PORT = 3000
START_SSH_SERVER = true
SSH_DOMAIN = forge.iedora.com
SSH_PORT = 222
SSH_LISTEN_PORT = 2222
OFFLINE_MODE = false

[database]
DB_TYPE = postgres
HOST = h-postgres:5432
NAME = forgejo
USER = forgejo
SSL_MODE = disable
; PASSWD vem de env_file (secrets/h-forgejo.env)

[security]
INSTALL_LOCK = true

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
SHOW_REGISTRATION_BUTTON = false

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
ACCOUNT_LINKING = login
USERNAME = preferred_username
UPDATE_AVATAR = true
REGISTER_EMAIL_CONFIRM = false

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://code.forgejo.org

[packages]
ENABLED = true

[log]
MODE = console
LEVEL = info

[repository]
DEFAULT_BRANCH = main
DEFAULT_PRIVATE = private
DEFAULT_PUSH_CREATE_PRIVATE = true
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[ui]
DEFAULT_THEME = forgejo-auto
EXPLORE_PAGING_NUM = 20

[indexer]
ISSUE_INDEXER_TYPE = bleve

[mailer]
ENABLED = false

[picture]
DISABLE_GRAVATAR = true

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[other]
SHOW_FOOTER_VERSION = true
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
