version: '3'

vars:
  COMPOSE: docker compose -f compose/compose.yaml
  SOPS_AGE_KEY_FILE: '{{.HOME}}/.config/sops/age/keys.txt'

env:
  SOPS_AGE_KEY_FILE: '{{.SOPS_AGE_KEY_FILE}}'

tasks:
  default:
    desc: Mostra tasks disponíveis
    cmds:
      - task --list

  networks:
    desc: Cria as networks Docker partilhadas (idempotente)
    cmds:
      - for n in edge internal dns; do docker network ls --format '{{`{{.Name}}`}}' | grep -q "^$n$" || docker network create "$n"; done
    silent: true

  up:
    desc: Decifra secrets e arranca o stack (sem profile bootstrap)
    deps: [decrypt, networks]
    cmd: "{{.COMPOSE}} up -d"

  up-bootstrap:
    desc: |
      Bootstrap completo de máquina nova num só comando:
      decrypt → networks → builds custom → compose up --profile bootstrap.
      Pré-req: ~/.config/sops/age/keys.txt e repo já pushed para forge.iedora.com.
    deps:
      - decrypt
      - networks
      - build-bootstrap-db
      - build-forgejo-config-bootstrap
    cmd: COMPOSE_PROFILES=bootstrap {{.COMPOSE}} up -d --wait

  build-forgejo-config-bootstrap:
    desc: Build local da imagem forgejo-config-bootstrap (idempotente)
    cmd: docker build -q -t forgejo-config-bootstrap:1.0.0 compose/stacks/infra/h-forgejo/bootstrap > /dev/null

  down:
    desc: Pára o stack (decrypted .env files ficam no disco)
    cmds:
      - "{{.COMPOSE}} down"

  decrypt:
    desc: Decifra in-place secrets/*.env (idempotente — só decifra os encriptados)
    cmd: |
      for f in secrets/*.env; do
        if grep -qE 'sops[:_]' "$f"; then
          sops -d -i --input-type dotenv --output-type dotenv "$f"
          chmod 600 "$f"
        fi
      done
      true
    silent: true

  lock:
    desc: Re-encripta in-place secrets/*.env (correr antes de commit)
    cmd: |
      for f in secrets/*.env; do
        if ! grep -qE 'sops[:_]' "$f"; then
          sops -e -i --input-type dotenv --output-type dotenv "$f"
        fi
      done
      true
    silent: true

  edit:
    desc: 'Editar um secret (uso: task edit NAME=h-auth) — sops abre, edita, re-encripta'
    requires:
      vars: [NAME]
    cmds:
      - sops --input-type dotenv --output-type dotenv secrets/{{.NAME}}.env

  build-bootstrap-db:
    desc: Build local h-bootstrap-db image (re-correr sempre que run.sh muda)
    cmds:
      - docker build -t h-bootstrap-db:1.0.0 compose/stacks/infra/h-bootstrap-db

  deploy-logs:
    desc: Tail dos logs do agente doco-cd
    cmds:
      - docker logs -f --tail 200 h-doco-cd

  migrate:
    desc: 'Re-correr migrations de uma app (uso: task migrate APP=imopush)'
    requires:
      vars: [APP]
    deps: [decrypt]
    cmds:
      - "{{.COMPOSE}} up --exit-code-from {{.APP}}-db-migrate {{.APP}}-db-bootstrap {{.APP}}-db-migrate"

  encrypt:
    desc: 'Encriptar in-place um secret novo (uso: task encrypt NAME=h-foo)'
    requires:
      vars: [NAME]
    cmds:
      - test -f secrets/{{.NAME}}.env
      - sops -e -i --input-type dotenv --output-type dotenv secrets/{{.NAME}}.env
      - echo "✓ secrets/{{.NAME}}.env encriptado in-place"

  rotate:
    desc: Re-encripta todos os secrets com a lista atual de recipients em .sops.yaml
    cmd: |
      for f in secrets/*.env; do
        if grep -qE 'sops[:_]' "$f"; then
          sops updatekeys -y "$f"
        fi
      done
    silent: true

  ps:
    desc: Estado dos containers
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: 'Tail logs de um serviço (uso: task logs NAME=h-auth)'
    requires:
      vars: [NAME]
    cmds:
      - "{{.COMPOSE}} logs -f --tail=100 {{.NAME}}"

  restic:
    desc: 'Restic CLI ad-hoc (uso: task restic -- snapshots / -- ls latest)'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic {{.CLI_ARGS}}"

  restic-init:
    desc: 'Inicializa o repositório Restic (uma vez por destino)'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic init || echo 'Já inicializado (esperado em re-runs)'"

  restic-snapshot:
    desc: 'Snapshot manual agora (ignora cron)'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup /usr/local/bin/backup"

  restic-snapshots:
    desc: 'Listar snapshots existentes'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic snapshots --compact"

  restic-check:
    desc: 'Integridade do repositório (rápido)'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic check"

  restic-restore:
    desc: 'Restore (uso: task restic-restore SNAP=latest TARGET=/tmp/restore)'
    requires: { vars: [SNAP, TARGET] }
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic restore {{.SNAP}} --target {{.TARGET}}"

  restic-stats:
    desc: 'Estatísticas: tamanho, blobs, deduplicação'
    cmds:
      - "{{.COMPOSE}} exec h-restic-backup restic stats --mode raw-data"

  _tofu:
    desc: |
      Internal — tofu wrapper cross-OS. Lê CLOUDFLARE_API_TOKEN e
      HOMED_TOFU_ENCRYPTION via Bitwarden Secrets Manager (bws CLI).
      Pré-req no operador (uma vez por máquina): bws instalado + env vars
      BWS_ACCESS_TOKEN e HOMED_BWS_PROJECT_ID exportadas.
    requires: { vars: [CMD] }
    cmds:
      - |
        set -eu
        command -v bws >/dev/null 2>&1 \
          || { echo "✗ bws CLI não instalado. https://bitwarden.com/help/secrets-manager-cli/"; exit 1; }
        command -v jq  >/dev/null 2>&1 \
          || { echo "✗ jq não instalado. (apt install jq | brew install jq | winget install stedolan.jq)"; exit 1; }
        : "${BWS_ACCESS_TOKEN:?export BWS_ACCESS_TOKEN=<machine-account-token>}"
        : "${HOMED_BWS_PROJECT_ID:?export HOMED_BWS_PROJECT_ID=<project-uuid>}"

        bws run --project-id "$HOMED_BWS_PROJECT_ID" -- '
          : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN não está no projecto bws}"
          : "${HOMED_TOFU_ENCRYPTION:?HOMED_TOFU_ENCRYPTION não está no projecto bws}"
          export TF_VAR_cf_api_token="$CLOUDFLARE_API_TOKEN"
          export TF_VAR_cf_account_id=$(curl -sfH "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts | jq -r ".result[0].id")
          export TF_VAR_cf_zone_id=$(curl -sfH "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=iedora.com" | jq -r ".result[0].id")
          export TF_VAR_encryption_passphrase="$HOMED_TOFU_ENCRYPTION"
          cd tofu && tofu {{.CMD}}
        '

  tofu-init:
    desc: 'Inicializa providers do Tofu'
    cmds: [{ task: _tofu, vars: { CMD: 'init' } }]

  tofu-plan:
    desc: 'Tofu plan (state encriptado)'
    cmds: [{ task: _tofu, vars: { CMD: 'plan' } }]

  tofu-apply:
    desc: 'Tofu apply (state encriptado). Lê tfvars de sops.'
    cmds: [{ task: _tofu, vars: { CMD: 'apply -auto-approve' } }]

  tofu-sync-secrets:
    desc: 'Lê tunnel_token do tofu, escreve secrets/h-cloudflared.env encriptado'
    cmd: |
      echo "TUNNEL_TOKEN=$(task _tofu CMD='output -raw tunnel_token')" > secrets/h-cloudflared.env
      sops -e -i --input-type dotenv --output-type dotenv secrets/h-cloudflared.env

  provision:
    desc: 'Bootstrap declarativo da máquina (Debian 12). Idempotente.'
    cmds:
      - ansible-playbook -i ansible/inventory.yml -l {{.HOST | default "localhost"}} ansible/provision.yml --ask-become-pass

  provision-check:
    desc: 'Dry-run do provision (mostra o que mudaria sem aplicar)'
    cmds:
      - ansible-playbook -i ansible/inventory.yml -l {{.HOST | default "localhost"}} ansible/provision.yml --check --diff

