services:
  h-prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls147
    container_name: h-prowlarr
    restart: unless-stopped
    security_opt: [ no-new-privileges:true ]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Lisbon
    volumes:
      - ./config:/config
    networks:
      - edge
    labels:
      caddy: http://prowlarr.iedora.com
      caddy.import: authelia
      caddy.reverse_proxy: "{{upstreams 9696}}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  edge:
    external: true
