# Deploy do homed via Forgejo Actions.
# Substitui h-deploy: o runner faz exactamente o que o playbook fazia.
#
# Pré-requisitos no Forgejo:
#   - Secret `SOPS_AGE_KEY` (base64 da chave age) registado em
#     forge.iedora.com/edu/homed → Settings → Actions → Secrets
#
# O runner monta /Users/eduvhc/homed read-write no job container.
# `task up` é a interface canónica: decifra secrets + compose up -d.

name: deploy
run-name: "deploy @ ${{ forge.sha }}"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: docker
    container:
      image: alpine:3.20
      # Acesso ao host repo + Docker daemon (DooD).
      volumes:
        - /Users/eduvhc/homed:/Users/eduvhc/homed:rw
        - /var/run/docker.sock:/var/run/docker.sock
    steps:

      - name: install tooling
        run: |
          apk add --no-cache git docker-cli sops age go-task curl bash openssh-client
          mkdir -p /usr/local/libexec/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.31.0/docker-compose-linux-$(uname -m)" \
            -o /usr/local/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/local/libexec/docker/cli-plugins/docker-compose
          docker version --format 'docker {{.Server.Version}} / compose {{.Server.Components}}' || true

      - name: setup age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" | base64 -d > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt
          echo "SOPS_AGE_KEY_FILE=$HOME/.config/sops/age/keys.txt" >> $GITHUB_ENV

      - name: sync homed working tree
        run: |
          cd /Users/eduvhc/homed
          git fetch origin main
          git reset --hard origin/main
          echo "homed @ $(git rev-parse --short HEAD)"

      - name: ensure networks
        run: |
          for n in edge internal dns; do
            docker network ls --format '{{.Name}}' | grep -q "^$n$" || docker network create "$n"
          done

      - name: deploy (decrypt + compose pull + up, exclui h-forgejo-runner)
        run: |
          cd /Users/eduvhc/homed
          export SOPS_AGE_KEY_FILE=$HOME/.config/sops/age/keys.txt
          task decrypt
          # Lista services menos os auto-destrutivos (runner é o que está a correr este job).
          SERVICES=$(docker compose -f compose/compose.yaml config --services | grep -vE '^(h-forgejo-runner|forgejo-runner-bootstrap)$' | tr '\n' ' ')
          docker compose -f compose/compose.yaml pull --quiet --policy missing $SERVICES || true
          docker compose -f compose/compose.yaml up -d --remove-orphans $SERVICES

      - name: heartbeat gatus
        if: success()
        run: |
          TOKEN=$(grep '^GATUS_TOKEN=' /Users/eduvhc/homed/secrets/h-restic.env | cut -d= -f2-)
          curl -fsS -m 5 -X POST \
            "http://h-gatus:8080/api/v1/endpoints/ops_deploy-homed/external?token=${TOKEN}&success=true" \
            > /dev/null || echo "heartbeat skipped (non-fatal)"
