# Versions pinadas das CLI tools que o homed precisa.
# Cross-OS: macOS, Linux, Windows WSL2. Operador + Beelink usam o mesmo pin.
#
# Bootstrap: `curl -fsSL https://mise.run | sh && cd ~/homed && mise install`
# Bump:      `mise upgrade <tool>` ou editar versão abaixo + `mise install`.
#
# Não incluído (decisões deliberadas):
#   - docker / docker compose: daemon-dependent, fica em apt (Beelink) ou Docker Desktop (Mac/Win)
#   - ansible: push-mode — só corre no operador. Mac via nix-darwin, WSL2/Linux via `pipx install ansible`
#   - restic: container `homed/h-restic` no Beelink; CLI local opcional via mise se preciso
#
# Backend default é aqua (single binary, fast install). bws via aqua tira a versão
# do tag `bws-v<X>` no repo bitwarden/sdk-sm.

[tools]
sops = "3.13.1"
age = "1.3.1"
task = "3.51.1"
opentofu = "1.12.1"
"bitwarden-secrets-manager" = "2.1.0"
jq = "1.8.1"
