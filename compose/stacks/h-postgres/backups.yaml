# h-postgres backups — pg_dumpall logical dump (daily 01:00).
# Escreve em /data/postgres-dumps/ (host bind) → consumido read-only pelo
# h-restic (cross-stack via filesystem; sem coupling de containers).
# Restic snapshota 02:00 (1h após o dump).

services:
  h-postgres-dump:
    image: prodrigestivill/postgres-backup-local:17
    container_name: h-postgres-dump
    restart: unless-stopped
    depends_on:
      h-postgres: { condition: service_healthy }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }
    security_opt: [ no-new-privileges:true ]
    env_file:
      - ../../../secrets/h-postgres.env
    environment:
      TZ: Europe/Lisbon
      POSTGRES_HOST: h-postgres
      POSTGRES_DB: postgres                  # ignorado em pg_dumpall
      POSTGRES_USER: postgres
      POSTGRES_EXTRA_OPTS: "--clean --if-exists"
      BACKUP_DIR: /backups
      POSTGRES_CLUSTER: "TRUE"               # pg_dumpall: roles + todas as DBs
      SCHEDULE: "0 1 * * *"                  # 01:00 (1h antes do restic)
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 1
      HEALTHCHECK_PORT: 8080
    volumes:
      - ../../../data/postgres-dumps:/backups
    networks: [internal]
    healthcheck:
      # Freshness do dump (não liveness do sidecar). 1500min = 25h (cron 01:00 + 1h margem).
      # start_period 1h porque após arranque, próximo dump pode estar a 23h de distância.
      test: ["CMD-SHELL", "find /backups/daily -name '*.sql.gz' -mmin -1500 | grep -q ."]
      interval: 10m
      timeout: 10s
      retries: 1
      start_period: 1h

networks:
  internal: { external: true }
