version: '3'

# SRP: OpenTofu via bws-injected secrets (zero plaintext em disco).
#
# Verbos seguros: tofu:plan, tofu:apply (passthrough útil para init/output/destroy).
# Pré-req: bws + BWS_ACCESS_TOKEN + HOMED_BWS_PROJECT_ID.
# bws inject: CLOUDFLARE_API_TOKEN + HOMED_TOFU_ENCRYPTION como env vars.
#
# Segurança: `task tofu CMD=...` é passthrough literal sem shell-escape de Go
# templates (https://taskfile.dev/reference/templating). CMD com `;`/`&&` é
# executável. Aceitável porque é local operator op (não vem de input externo).
# Para automação CI: usar verbos explícitos (tofu:plan, tofu:apply), nunca o
# passthrough com input dinâmico.

tasks:
  # ─── verbos seguros (uso diário) ───
  plan:
    desc: 'Tofu plan (read-only — diff entre state e código)'
    cmds: [{ task: _run, vars: { TF_CMD: 'plan' } }]

  apply:
    desc: 'Tofu apply -auto-approve (state encriptado, vars bws-injected)'
    cmds: [{ task: _run, vars: { TF_CMD: 'apply -auto-approve' } }]

  # ─── passthrough para subcommands raros (init, output, destroy, taint, etc.) ───
  default:
    desc: 'Tofu CMD passthrough (uso: task tofu CMD=init / CMD="output -raw X")'
    requires: { vars: [CMD] }
    cmds: [{ task: _run, vars: { TF_CMD: '{{.CMD}}' } }]

  # ─── pipeline: output → secret encriptado ───
  sync-secrets:
    desc: Tunnel_token → secrets/h-cloudflared.env (encriptado, zero plaintext em disco)
    cmd: |
      tmp=$(mktemp) && trap 'rm -f "$tmp"' EXIT
      # tofu output emite ZERO chatter — só o valor. tail -1 para limpar
      # qualquer warning eventual sem engolir erros (não usar 2>/dev/null).
      TOKEN=$(task tofu:_run TF_CMD='output -raw tunnel_token' | tail -1)
      [ -n "$TOKEN" ] || { echo "✗ tunnel_token vazio — tofu output falhou" >&2; exit 1; }
      echo "TUNNEL_TOKEN=$TOKEN" > "$tmp"
      sops -e --input-type dotenv --output-type dotenv "$tmp" > secrets/h-cloudflared.env

  # ─── internal: bws-wrapped tofu runner. Não usar directo. ───
  _run:
    internal: true
    requires: { vars: [TF_CMD] }
    preconditions:
      - sh: command -v bws
        msg: "bws CLI não instalado — https://bitwarden.com/help/secrets-manager-cli/"
      - sh: command -v jq
        msg: "jq não instalado (apt install jq | brew install jq)"
      - sh: test -n "$BWS_ACCESS_TOKEN"
        msg: "export BWS_ACCESS_TOKEN=<machine-account-token>"
      - sh: test -n "$HOMED_BWS_PROJECT_ID"
        msg: "export HOMED_BWS_PROJECT_ID=<project-uuid>"
    cmd: |
      bws run --project-id "$HOMED_BWS_PROJECT_ID" -- sh -c '
        : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN não está no projecto bws}"
        : "${HOMED_TOFU_ENCRYPTION:?HOMED_TOFU_ENCRYPTION não está no projecto bws}"
        : "${R2_STATE_ACCESS_KEY:?R2_STATE_ACCESS_KEY não está no projecto bws}"
        : "${R2_STATE_SECRET_KEY:?R2_STATE_SECRET_KEY não está no projecto bws}"
        export TF_VAR_cf_api_token="$CLOUDFLARE_API_TOKEN"
        TF_VAR_cf_account_id=$(curl -sfH "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          https://api.cloudflare.com/client/v4/accounts | jq -r ".result[0].id")
        TF_VAR_cf_zone_id=$(curl -sfH "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          "https://api.cloudflare.com/client/v4/zones?name=iedora.com" | jq -r ".result[0].id")
        export TF_VAR_cf_account_id TF_VAR_cf_zone_id
        export TF_VAR_encryption_passphrase="$HOMED_TOFU_ENCRYPTION"
        # Backend S3 (R2): credentials via env vars standard
        export AWS_ACCESS_KEY_ID="$R2_STATE_ACCESS_KEY"
        export AWS_SECRET_ACCESS_KEY="$R2_STATE_SECRET_KEY"
        cd tofu
        # Endpoint dinâmico via backend-config file (forma documentada para
        # valor nested em HCL — flag form -backend-config=KEY=VAL não aceita HCL).
        BACKEND_FILE=$(mktemp)
        trap "rm -f $BACKEND_FILE" EXIT
        printf "endpoints = { s3 = \"https://%s.r2.cloudflarestorage.com\" }\n" \
          "$TF_VAR_cf_account_id" > "$BACKEND_FILE"
        # Se TF_CMD começa por "init" o user controla flags (ex.: init -migrate-state
        # na 1ª transição local→R2). Senão init silencioso só se .terraform/ não existir.
        case "{{.TF_CMD}}" in
          init*) tofu {{.TF_CMD}} -backend-config="$BACKEND_FILE" ;;
          *)
            [ -d .terraform ] || tofu init -backend-config="$BACKEND_FILE" >/dev/null
            tofu {{.TF_CMD}}
            ;;
        esac
      '
