# h-restic engine — single container, supercronic-driven (backup/check/forget).
# Decoupled: monta /data umbrella ro. Apps com backup-prep escrevem para
# /data/<svc>/ e ficam auto-cobertas. Sem coupling em h-restic ao adicionar
# serviços. Init do repo é idempotente (entrypoint.sh).

services:
  h-restic:
    build: ./bootstrap
    image: homed/h-restic:1.0.0
    container_name: h-restic
    restart: unless-stopped
    security_opt: [ no-new-privileges:true ]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }
    env_file:
      - ../../../secrets/h-restic.env       # RESTIC_REPOSITORY, RESTIC_PASSWORD, AWS_*, GATUS_TOKEN
    environment:
      TZ: Europe/Lisbon
    volumes:
      - ../../../data:/source/data:ro        # umbrella: backup-prep outputs
      - ../../../secrets:/source/secrets:ro  # SOPS-encrypted (R2-only DR)
      - ../../../compose:/source/compose:ro  # IaC (R2-only DR)
      - h-valkey-data:/source/valkey:ro      # Docker named vol (exceção; convenção é /data/)
      - h-restic-repo:/repo                  # dev/OrbStack only (prod: R2)
      - ./excludes:/etc/restic/excludes:ro
    networks: [internal]                     # POST deadman a h-gatus:8080
    healthcheck:
      test: ["CMD-SHELL", "pgrep supercronic > /dev/null"]
      interval: 1m
      timeout: 5s
      retries: 2
      start_period: 30s

networks:
  internal: { external: true }
