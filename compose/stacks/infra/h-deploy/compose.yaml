# h-deploy — webhook receiver para deploys auto-hospedados.
#
# Recebe POST de GitHub/Forgejo/Gitea, valida HMAC SHA-256, executa shell
# scripts que fazem git pull + docker build + docker compose up.
#
# Auth: HMAC SHA-256 por hook (header X-Hub-Signature-256 ou compatíveis).
# Exposição: via Caddy → tunnel CF, sem Authelia (webhooks não fazem login).

services:
  h-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    image: h-deploy:1.0.0
    container_name: h-deploy
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    env_file:
      - ../../../../secrets/h-deploy.env
    environment:
      TZ: Europe/Lisbon
    volumes:
      # Docker socket — necessário para build/compose dentro do container.
      # Trade-off aceite: socket = root no host. Mitigado por HMAC + tunnel.
      - /var/run/docker.sock:/var/run/docker.sock
      # Hooks + playbooks Ansible (read-only).
      - ./config/hooks.yaml:/etc/webhook/hooks.yaml:ro
      - ./playbooks:/etc/playbooks:ro
      # Workspace dos repos clonados — persistente para layer cache.
      - h-deploy-workspace:/workspace
      # SSH key para repos privados (mounted read-only, root:root, perms 600 no host).
      - ../../../../secrets/keys/id_ed25519_deploy:/root/.ssh/id_ed25519:ro
      - ../../../../secrets/keys/known_hosts:/root/.ssh/known_hosts:ro
      # Log de deploys (rotated 10 MB × 5 pelo daemon docker).
      - ../../../../data/deploy/:/var/log/deploy/
      # Acesso ao homed local — para `docker compose -f compose/compose.yaml up`.
      # IMPORTANTE: source e target têm que ser idênticos. O Docker daemon
      # resolve bind-mounts contra o filesystem do host; se compose.yaml usar
      # paths relativos, eles têm que resolver para o mesmo caminho real
      # quer dentro quer fora do container. Caso contrário, o daemon cria
      # directorias vazias no path "errado" e os containers ficam broken.
      - /Users/eduvhc/homed:/Users/eduvhc/homed:ro
    networks:
      - edge      # para o Caddy chegar até cá
    labels:
      caddy: http://deploy.iedora.com
      # SEM `caddy.import: authelia` — webhooks autenticam-se via HMAC.
      caddy.reverse_proxy: "{{upstreams 9000}}"

volumes:
  h-deploy-workspace:

networks:
  edge:
    external: true
