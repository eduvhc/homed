version: '3'

# Root Taskfile. SRP via includes: cada módulo trata um domínio.
# Verbos diários ficam aqui; ops específicas estão em .taskfiles/<module>.yaml.
#
# Listar tudo: `task --list-all` (inclui módulos prefixados com `<mod>:`)

vars:
  COMPOSE: docker compose -f compose/compose.yaml

env:
  # Propagados a todos os subprocessos (incluindo módulos via includes:).
  SOPS_AGE_KEY_FILE: '{{.HOME}}/.config/sops/age/keys.txt'
  COMPOSE: '{{.COMPOSE}}'

includes:
  secrets: .taskfiles/secrets.yaml
  build:   .taskfiles/build.yaml
  restic:  .taskfiles/restic.yaml
  tofu:    .taskfiles/tofu.yaml

tasks:
  default:
    desc: Lista todas as tasks (módulos prefixados)
    silent: true
    cmd: task --list-all

  # ─────────────────────────────  lifecycle  ─────────────────────────────────
  up:
    desc: |
      Arranca o stack. PROFILE=bootstrap na 1ª boot ou re-seed.
      Auto: secrets:decrypt + builds custom + docker networks idempotentes.
      --wait sempre com timeout (bootstrap 600s, normal 120s) para que
      healthchecks surfaceiem em vez de "ficou silenciosamente unhealthy".
    deps:
      - secrets:decrypt
      - build:forgejo-bootstrap
      - build:h-yt-dlp
      - build:h-restic
      - build:bootstrap-db
    cmds:
      - for: ['edge', 'internal', 'dns']
        cmd: docker network inspect {{.ITEM}} >/dev/null 2>&1 || docker network create {{.ITEM}}
      - COMPOSE_PROFILES={{.PROFILE | default ""}} {{.COMPOSE}} up -d --wait --wait-timeout {{.WAIT_TIMEOUT}}
    vars:
      # Bootstrap puxa imagens + corre inits (forgejo db + admin + OIDC) — pode demorar.
      # Day-to-day é só restart, 2 min é generoso. Default Docker é 0 = infinito (issue #10269).
      WAIT_TIMEOUT: '{{if .PROFILE}}600{{else}}120{{end}}'

  down:
    desc: Pára o stack (decryptos ficam no disco)
    cmd: '{{.COMPOSE}} down'

  ps:
    desc: Estado dos containers
    cmd: '{{.COMPOSE}} ps'

  logs:
    desc: 'Tail logs (uso: task logs NAME=h-auth)'
    requires: { vars: [NAME] }
    cmd: '{{.COMPOSE}} logs -f --tail=100 {{.NAME}}'

  validate:
    desc: Valida Taskfile (parse) + árvore de composes (config -q). Pre-commit.
    silent: true
    cmds:
      - task --list-all >/dev/null
      - '{{.COMPOSE}} --profile bootstrap config -q'

  # ─────────────────────────────  bootstrap  ─────────────────────────────────
  provision:
    desc: |
      Bootstrap declarativo da máquina (uso: task provision HOST=beelink).
      Se ANSIBLE_BECOME_PASS está exportado, usa não-interactivo (CI-friendly).
      Caso contrário, --ask-become-pass prompta o sudo password no terminal.
    cmd: |
      if [ -n "${ANSIBLE_BECOME_PASS:-}" ]; then
        ansible-playbook -i ansible/inventory.yml -l {{.HOST | default "localhost"}} ansible/provision.yml -e ansible_become_pass="$ANSIBLE_BECOME_PASS"
      else
        ansible-playbook -i ansible/inventory.yml -l {{.HOST | default "localhost"}} ansible/provision.yml --ask-become-pass
      fi

  # ───────────────────────────────  db  ──────────────────────────────────────
  migrate:
    desc: 'DB migrations dum app (uso: task migrate APP=imopush)'
    requires: { vars: [APP] }
    deps: [secrets:decrypt]
    cmd: '{{.COMPOSE}} up --exit-code-from {{.APP}}-db-migrate {{.APP}}-db-bootstrap {{.APP}}-db-migrate'
