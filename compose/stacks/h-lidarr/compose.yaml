services:
  h-lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0.4875-ls29
    container_name: h-lidarr
    restart: unless-stopped
    security_opt: [ no-new-privileges:true ]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Lisbon
    volumes:
      - ./config:/config
      - ../../../data/media/music:/music      # mesma árvore que Navidrome lê
      - ../../../data/downloads:/downloads    # qBittorrent escreve aqui, Lidarr move para /music
    networks:
      - edge
    labels:
      caddy: http://lidarr.iedora.com
      caddy.import: authelia
      caddy.reverse_proxy: "{{upstreams 8686}}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  edge:
    external: true
