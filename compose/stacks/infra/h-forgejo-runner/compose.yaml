# h-forgejo-runner — Forgejo Actions runner self-hosted.
#
# Pattern: bootstrap one-shot (regista o runner se .runner não existe) + daemon.
# Source: internal/app/cmd/register.go, internal/app/cmd/daemon.go
#
# DooD: o daemon do host é montado via docker_host=automount no config.yaml.
# Trade-off: jobs têm acesso ao daemon. Aceitável para single-operator;
# revisitar com DinD se vier multi-tenant.

services:

  # ─── bootstrap one-shot ───
  # Regista o runner no Forgejo (cria /data/.runner). Idempotente: corre só
  # se o ficheiro não existe (verificado pelo command shell wrapper).
  forgejo-runner-bootstrap:
    image: data.forgejo.org/forgejo/runner:6.4.0
    container_name: forgejo-runner-bootstrap
    restart: "no"
    depends_on:
      h-forgejo: { condition: service_healthy }
    env_file:
      - ../../../../secrets/h-forgejo.env   # FORGEJO_RUNNER_REGISTRATION_TOKEN
    networks: [internal]
    volumes:
      - h-forgejo-runner-data:/data
    user: "1000:1000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /data/.runner ]; then
          echo "runner já registado (/data/.runner existe), skip"
          exit 0
        fi
        forgejo-runner register \
          --no-interactive \
          --instance http://h-forgejo:3000 \
          --token "$$FORGEJO_RUNNER_REGISTRATION_TOKEN" \
          --name h-forgejo-runner \
          --labels docker:docker://node:lts

  # ─── daemon: poll Forgejo + executa jobs ───
  h-forgejo-runner:
    image: data.forgejo.org/forgejo/runner:6.4.0
    container_name: h-forgejo-runner
    restart: unless-stopped
    depends_on:
      forgejo-runner-bootstrap: { condition: service_completed_successfully }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [internal]
    # User 1000:1000 (default da imagem) + group_add para aceder ao socket.
    # Mantém defense-in-depth dentro do container (vs user: 0:0).
    #
    # OrbStack/dev: socket é root:root (GID 0); Beelink/prod (Debian 12): GID 999
    # (grupo "docker"). Override em compose.override.yaml ou Taskfile.
    # Source: forgejo-runner/examples/vm/rootless-docker.md (group_add pattern)
    # Research: tecnativa/docker-socket-proxy é theatre para CI runners — blast
    # radius continua igual quando CONTAINERS+BUILD estão habilitados.
    user: "1000:1000"
    group_add:
      - "${DOCKER_SOCK_GID:-0}"
    volumes:
      - h-forgejo-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock   # DooD
      - ./config/config.yaml:/data/config.yaml:ro
    command: ["forgejo-runner", "daemon", "--config", "/data/config.yaml"]

volumes:
  h-forgejo-runner-data:

networks:
  internal: { external: true }
