; h-forgejo · app.ini
; A maior parte da config vive nos env vars do compose.yaml (FORGEJO__*),
; o que permite versionar valores no git. Este ficheiro mantém só o que não
; tem override por env conveniente ou que beneficia de ser explícito.
;
; Documentação: https://forgejo.org/docs/latest/admin/config-cheat-sheet/

APP_NAME = forge · iedora
RUN_MODE = prod
RUN_USER = git

[repository]
DEFAULT_BRANCH = main
DEFAULT_PRIVATE = private
DEFAULT_PUSH_CREATE_PRIVATE = true
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[ui]
DEFAULT_THEME = forgejo-auto
EXPLORE_PAGING_NUM = 20

[indexer]
ISSUE_INDEXER_TYPE = bleve

[mailer]
ENABLED = false

[picture]
DISABLE_GRAVATAR = true

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[other]
SHOW_FOOTER_VERSION = true
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
