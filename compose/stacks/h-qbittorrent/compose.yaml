services:
  h-qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.12-ls459
    container_name: h-qbittorrent
    restart: unless-stopped
    security_opt: [ no-new-privileges:true ]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Lisbon
      WEBUI_PORT: 8080
    volumes:
      - ./config:/config
      - ../../../data/downloads:/downloads
    networks:
      - edge
    labels:
      caddy: http://qb.iedora.com
      caddy.import: authelia
      caddy.reverse_proxy: "{{upstreams 8080}}"
    # /api/v2/app/version requer auth — usar root WebUI (serve login, 200 OK)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  edge:
    external: true
