version: '3'

# SRP: SOPS secrets lifecycle — decrypt/lock in-place, edit, rotate recipients,
# e bootstrap one-shot da age private key (operator-side, via bws).
#
# Convention: secrets/*.env são encriptados in-place (sem .sops paralelos).
# Decrypt produz plaintext mode 600 para `env_file:` do compose ler.

tasks:
  decrypt:
    desc: Decifra in-place secrets/*.env (idempotente — só os encriptados)
    silent: true
    vars:
      ENCRYPTED:
        sh: grep -lE 'sops[:_]' secrets/*.env 2>/dev/null || true
    cmds:
      - for: { var: ENCRYPTED, split: "\n", as: F }
        cmd: sops -d -i --input-type dotenv --output-type dotenv '{{.F}}'
      - for: { var: ENCRYPTED, split: "\n", as: F }
        cmd: chmod 600 '{{.F}}'

  lock:
    desc: Re-encripta in-place secrets/*.env (correr antes de commit)
    silent: true
    vars:
      PLAINTEXT:
        sh: grep -LE 'sops[:_]' secrets/*.env 2>/dev/null || true
      ALL:
        sh: ls secrets/*.env 2>/dev/null || true
    cmds:
      - for: { var: PLAINTEXT, split: "\n", as: F }
        cmd: sops -e -i --input-type dotenv --output-type dotenv '{{.F}}'
      - for: { var: ALL, split: "\n", as: F }
        cmd: chmod 600 '{{.F}}'

  edit:
    desc: 'Editar um secret (uso: task secrets:edit NAME=h-auth)'
    requires: { vars: [NAME] }
    cmd: sops --input-type dotenv --output-type dotenv secrets/{{.NAME}}.env

  rotate:
    desc: Re-encripta com lista actual de recipients em .sops.yaml
    silent: true
    vars:
      ENCRYPTED:
        sh: grep -lE 'sops[:_]' secrets/*.env 2>/dev/null || true
    cmds:
      - for: { var: ENCRYPTED, split: "\n", as: F }
        cmd: sops updatekeys -y '{{.F}}'

  bootstrap-age-key:
    desc: |
      Fetch age key para ~/.config/sops/age/keys.txt. Idempotente.
      Precedência (3 paths para resilience + UX):
        1. $HOMED_AGE_KEY (env)              — CI, paper-backup, env override
        2. bws (BWS_ACCESS_TOKEN + project)  — operator com BWS setup
        3. prompt stdin (cola + Ctrl-D)      — fresh server, DR offline
    status:
      - test -f "$SOPS_AGE_KEY_FILE"
    cmd: |
      mkdir -p "$(dirname "$SOPS_AGE_KEY_FILE")"
      # chmod best-effort — se dir parent é system-owned (ex.: /tmp em testes),
      # ignora. Em uso real (~/.config/sops/age) o user é owner.
      chmod 700 "$(dirname "$SOPS_AGE_KEY_FILE")" 2>/dev/null || true
      # Atomic write: escrever .tmp → mv. Mid-write crash deixa destino inalterado.
      tmp="${SOPS_AGE_KEY_FILE}.tmp.$$"
      trap 'rm -f "$tmp"' EXIT
      if [ -n "${HOMED_AGE_KEY:-}" ]; then
        printf '%s\n' "$HOMED_AGE_KEY" > "$tmp"
        echo "✓ age key vinda de \$HOMED_AGE_KEY"
      elif command -v bws >/dev/null 2>&1 && [ -n "${BWS_ACCESS_TOKEN:-}" ] && [ -n "${HOMED_BWS_PROJECT_ID:-}" ]; then
        bws run --project-id "$HOMED_BWS_PROJECT_ID" -- sh -c '
          : "${HOMED_AGE_KEY:?HOMED_AGE_KEY não está no projecto bws}"
          printf "%s\n" "$HOMED_AGE_KEY"
        ' > "$tmp"
        echo "✓ age key vinda de bws"
      else
        echo "→ Cola o conteúdo do age key (multi-line OK; Ctrl-D quando acabar):" >&2
        cat > "$tmp"
        echo "✓ age key lida de stdin"
      fi
      chmod 600 "$tmp"
      mv "$tmp" "$SOPS_AGE_KEY_FILE"
