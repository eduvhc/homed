# h-postgres — Postgres partilhado para apps SaaS (metamenu, imopush, futuras).
#
# Trade-off honesto (decidido):
#   - Upgrade major (17→18) afecta todas as apps em simultâneo.
#   - Connection pool partilhado; statement_timeout por role mitiga blast radius.
#   - Restore granular requer extrair DB do dump.
#
# Apps conectam-se via network "internal" → host "h-postgres", port 5432.
# Sem porta exposta no host.

services:
  h-postgres:
    image: postgres:17-alpine
    container_name: h-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    security_opt: [ no-new-privileges:true ]
    env_file:
      - ../../../../secrets/h-postgres.env
    environment:
      TZ: Europe/Lisbon
      # superuser (init.d corre como este user)
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      # auth scram-sha-256 por default em PG 17 (forte; reverter só se app não suportar)
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - h-postgres-data:/var/lib/postgresql/data
      # h-postgres é pura infra — não conhece apps específicas.
      # Bootstrap de role/DB por app vive em stacks/apps/<app>/<app>-db-bootstrap.
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  h-postgres-data:

networks:
  internal:
    external: true
