# Opções globais yt-dlp — uma por linha.
# Override por URL: meter na própria linha do playlists.txt entre aspas se preciso.

# Apenas áudio na melhor qualidade
--format bestaudio/best
--extract-audio
--audio-format opus
--audio-quality 0

# Metadados + thumbnail como capa do álbum (ID3v2 / Vorbis comments)
--embed-thumbnail
--embed-metadata
--add-metadata
--parse-metadata "uploader:%(artist)s"
--parse-metadata "playlist:%(album)s"

# Output template: /music/<Canal>/<Playlist>/<NN - Título>.opus
# Se sem playlist, /music/<Canal>/<Título>.opus
--output "%(uploader)s/%(playlist|)s/%(playlist_index&{:02d} - |)s%(title)s.%(ext)s"

# Robustez
--ignore-errors
--no-overwrites
--continue
--retries 5
--fragment-retries 5
--concurrent-fragments 4

# Não criar ficheiros vazios em falhas
--no-write-info-json
--no-write-description
--no-write-comments
--no-write-thumbnail
