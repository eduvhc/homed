# Bootstrap declarativo do Beelink (Debian 12) para o estado em que `task up` arranca.
# Idempotente: cada task verifica o estado antes de agir. Re-correr é seguro.

- name: homed · bootstrap
  hosts: all
  become: false
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64
    debian_arch: "{{ arch_map[ansible_architecture] | default(ansible_architecture) }}"
    # Lowercase 'debian' ou 'ubuntu' — usado nas URLs de docker/tailscale.
    # Ambos os upstreams seguem o mesmo path scheme (/linux/{distro}, /stable/{distro}).
    distro: "{{ ansible_distribution | lower }}"

  pre_tasks:
    - name: Assert Debian 12+ ou Ubuntu 22.04+
      ansible.builtin.assert:
        that:
          - (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12)
            or (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version | int >= 22)
        fail_msg: "Suportados: Debian 12+ ou Ubuntu 22.04+ (atual: {{ ansible_distribution }} {{ ansible_distribution_version }})"

  tasks:

    # ───────────────────────────────  apt base  ────────────────────────────────
    - name: APT · pacotes essenciais
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - ufw
          - restic
        update_cache: true
        cache_valid_time: 3600

    # ──────────────────────────────  docker repo  ──────────────────────────────
    - name: Docker · keyring
      become: true
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ distro }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: false

    - name: Docker · apt source
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/{{ distro }}
          Suites: {{ ansible_distribution_release }}
          Components: stable
          Architectures: {{ debian_arch }}
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Docker · instalar engine + plugins
      become: true
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: true

    - name: Docker · utilizador no grupo docker
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true

    - name: Docker · serviço enabled + running
      become: true
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ────────────────────────────  mise + CLI tools  ──────────────────────────
    # mise pinada em ~/homed/.mise.toml é o single source of truth para versões
    # de sops/age/task/opentofu/bws/jq. Operador e Beelink ficam idênticos.
    # Install é per-user (em ~/.local), sem sudo — match do modelo do operador.
    - name: mise · install via official installer (idempotente)
      ansible.builtin.shell: |
        set -eu
        curl -fsSL https://mise.run | sh
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/mise"

    - name: mise · activate em ~/.bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: 'eval "$($HOME/.local/bin/mise activate bash)"'
        regexp: '^eval "\$\(\$HOME/\.local/bin/mise activate bash'
        create: true
        mode: '0644'

    # mise trust é obrigatório por design — sem isto qualquer comando mise
    # falha com "Config files are not trusted". Idempotente (trust é per-path).
    - name: mise · trust ~/homed/.mise.toml
      ansible.builtin.command:
        cmd: "{{ ansible_env.HOME }}/.local/bin/mise trust {{ ansible_env.HOME }}/homed/.mise.toml"
      changed_when: false

    - name: mise · install tools pinned em ~/homed/.mise.toml
      ansible.builtin.command:
        cmd: "{{ ansible_env.HOME }}/.local/bin/mise install"
        chdir: "{{ ansible_env.HOME }}/homed"
      register: mise_install
      changed_when: "'already installed' not in mise_install.stdout and mise_install.stdout != ''"

    # ────────────────────────────────  tailscale  ──────────────────────────────
    - name: Tailscale · keyring
      become: true
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/{{ distro }}/{{ ansible_distribution_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: '0644'

    - name: Tailscale · apt source
      become: true
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/{{ distro }}/{{ ansible_distribution_release }}.tailscale-keyring.list"
        dest: /etc/apt/sources.list.d/tailscale.list
        mode: '0644'

    - name: Tailscale · instalar
      become: true
      ansible.builtin.apt:
        name: tailscale
        update_cache: true

    # ─────────────────────────────  Docker networks  ───────────────────────────
    - name: Docker · networks (edge, internal, dns)
      community.docker.docker_network:
        name: "{{ item }}"
        state: present
      loop: [edge, internal, dns]

    # ────────────────────────────────────  ufw  ────────────────────────────────
    - name: UFW · defaults
      become: true
      community.general.ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }

    - name: UFW · regras LAN-only
      become: true
      community.general.ufw:
        rule: allow
        from_ip: "{{ lan_cidr }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: 22,  comment: "SSH LAN" }
        - { port: 53,  proto: tcp, comment: "DNS LAN (AdGuard)" }
        - { port: 53,  proto: udp, comment: "DNS LAN (AdGuard)" }
        - { port: 80,  comment: "HTTP LAN (Caddy)" }
        - { port: 443, comment: "HTTPS LAN (Caddy)" }

    - name: UFW · enabled
      become: true
      community.general.ufw:
        state: enabled

    # ─────────────────────────────  shell env (sops)  ──────────────────────────
    - name: Shell · SOPS_AGE_KEY_FILE em ~/.bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: "export SOPS_AGE_KEY_FILE={{ age_key_dir }}/keys.txt"
        regexp: '^export SOPS_AGE_KEY_FILE='
        create: true
        mode: '0644'

    # ─────────────────────────────  age key (estado)  ──────────────────────────
    - name: Age · dir
      ansible.builtin.file:
        path: "{{ age_key_dir }}"
        state: directory
        mode: '0700'

    # Age key chega ao servidor via copy do operador (que já a tem em local,
    # vinda de bws via `task secrets:bootstrap-age-key`). O servidor nunca toca em bws.
    # Idempotente: ansible só copia se o conteúdo diferir.
    - name: Age · copy private key do operador para o servidor
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/sops/age/keys.txt"
        dest: "{{ age_key_dir }}/keys.txt"
        mode: '0600'

  post_tasks:
    - name: Resumo final
      ansible.builtin.debug:
        msg:
          - "✓ Provision OK · arch={{ debian_arch }}"
          - "Próximo: 'sudo tailscale up' (autenticação), depois 'task up'"
          - "Logout/login para o grupo docker ficar ativo (ou newgrp docker)"
