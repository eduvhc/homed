# h-restic engine — backup/check/forget. 3 containers, crons mutuamente exclusivos.
# Pattern da imagem mazzolino/restic. Anchor partilhado por todos.
# Excepção documentada ao cap 80L: 3 services partilham x-restic-base.
#
# Decoupling: monta /data como umbrella. Qualquer serviço com backup-prep
# (h-postgres/backups.yaml, h-foo/backups.yaml, ...) escreve sob /data/<svc>/
# e fica auto-coberto. Sem necessidade de tocar aqui ao adicionar serviços.
#
# POST_COMMANDS_*: $$JOB_NAME é expandido pelo shell do container em runtime
# (compose: $$ → $; mazzolino/restic executa via sh -c).
x-gatus-success: &gatus-success >-
  curl -fsS -m 10 --retry 3 -X POST "http://h-gatus:8080/api/v1/endpoints/ops_$$JOB_NAME/external?token=$$GATUS_TOKEN&success=true"
x-gatus-failure: &gatus-failure >-
  curl -fsS -m 10 --retry 3 -X POST "http://h-gatus:8080/api/v1/endpoints/ops_$$JOB_NAME/external?token=$$GATUS_TOKEN&success=false"

x-restic-base: &restic-base
  image: mazzolino/restic:1.8.2
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: "5m", max-file: "3" }
  security_opt: [ no-new-privileges:true ]
  env_file:
    - ../../../secrets/h-restic.env
  environment:
    TZ: Europe/Lisbon
  volumes:
    - ../../../data:/source/data:ro        # umbrella: backup-prep outputs (decoupled)
    - ../../../secrets:/source/secrets:ro  # SOPS-encrypted (R2-only DR)
    - ../../../compose:/source/compose:ro  # IaC (R2-only DR)
    - h-valkey-data:/source/valkey:ro         # Docker named vol (exceção; convenção é /data/)
    - h-restic-repo:/repo
    - ./excludes:/etc/restic/excludes:ro
  networks:
    - internal   # para chegar a h-gatus:8080 (gatus está em [edge, internal])

services:
  # snapshot incremental diário
  h-restic-backup:
    <<: *restic-base
    container_name: h-restic-backup
    environment:
      TZ: Europe/Lisbon
      JOB_NAME: restic-backup
      BACKUP_CRON: "0 0 2 * * *"           # daily 02:00 (formato 6 campos)
      RESTIC_BACKUP_SOURCES: "/source"
      RESTIC_BACKUP_ARGS: "--tag scheduled --exclude-file=/etc/restic/excludes"
      POST_COMMANDS_SUCCESS: *gatus-success
      POST_COMMANDS_FAILURE: *gatus-failure

  # integridade semanal (5% sample)
  h-restic-check:
    <<: *restic-base
    container_name: h-restic-check
    depends_on: [h-restic-backup]
    environment:
      TZ: Europe/Lisbon
      JOB_NAME: restic-check
      SKIP_INIT: "true"
      CHECK_CRON: "0 0 3 * * 0"            # Sun 03:00
      RESTIC_CHECK_ARGS: "--read-data-subset=5%"
      POST_COMMANDS_SUCCESS: *gatus-success
      POST_COMMANDS_FAILURE: *gatus-failure

  # retention semanal
  h-restic-forget:
    <<: *restic-base
    container_name: h-restic-forget
    depends_on: [h-restic-backup]
    environment:
      TZ: Europe/Lisbon
      JOB_NAME: restic-forget
      SKIP_INIT: "true"
      PRUNE_CRON: "0 0 4 * * 0"            # Sun 04:00
      RESTIC_FORGET_ARGS: >-
        --tag scheduled
        --keep-daily 7
        --keep-weekly 4
        --keep-monthly 12
        --keep-yearly 2
      POST_COMMANDS_SUCCESS: *gatus-success
      POST_COMMANDS_FAILURE: *gatus-failure

networks:
  internal: { external: true }
