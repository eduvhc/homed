# YAML anchors partilhados.
# Cada stack faz: `<<: *defaults` no serviço, e no topo:
#   ---
#   x-defaults: &defaults
#     <<: *common-defaults
# Ou importa via `extends:` se preferires composição menos invasiva.

x-common-defaults: &common-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  security_opt:
    - no-new-privileges:true
