services:
  h-adguard:
    image: adguard/adguardhome:v0.107.77
    container_name: h-adguard
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    security_opt: [ no-new-privileges:true ]
    ports:
      # DNS é o único acesso direto (LAN clients fazem queries diretamente).
      # Em prod (Beelink): "53:53/tcp" e "53:53/udp" — porta well-known.
      # Em OrbStack (Mac já usa 53 para mDNS): porta alta para dev.
      - "5353:53/tcp"
      - "5353:53/udp"
      # Admin UI: SEM host port — só via Caddy + Authelia (subdomínio adguard.iedora.com)
    volumes:
      - ./config/work:/opt/adguardhome/work
      - ./config/conf:/opt/adguardhome/conf
    networks:
      - dns
      - edge
    labels:
      caddy: http://adguard.iedora.com
      caddy.import: authelia
      caddy.reverse_proxy: "{{upstreams 80}}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/control/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  dns:
    external: true
  edge:
    external: true
