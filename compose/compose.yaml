# homed — top-level compose.
# Apenas agrega stacks via `include:` e define networks partilhadas.
# Cada serviço vive em stacks/<nome>/compose.yaml (flat — sem categorias).
# Ver docs/compose-standard.md.

include:
  - stacks/h-proxy/compose.yaml
  - stacks/h-cloudflared/compose.yaml
  - stacks/h-valkey/compose.yaml
  - stacks/h-auth/compose.yaml
  - stacks/h-postgres/compose.yaml                 # entry: runtime + backups (pg_dumpall)
  - stacks/h-doco-cd/compose.bootstrap.yaml        # GitOps agent (profile=bootstrap)
  - stacks/h-forgejo/compose.yaml                  # entry: runtime + init (db/admin/OIDC)
  - stacks/h-forgejo/compose.bootstrap.yaml        # opt-in: PAT/webhook (profile=bootstrap)
  - stacks/h-adguard/compose.yaml
  - stacks/h-whoami/compose.yaml                   # backend de teste Caddy + Authelia
  - stacks/h-navidrome/compose.yaml
  - stacks/h-qbittorrent/compose.yaml
  - stacks/h-prowlarr/compose.yaml
  - stacks/h-lidarr/compose.yaml
  - stacks/h-glances/compose.yaml
  - stacks/h-dashboard/compose.yaml
  - stacks/h-yt-dlp/compose.yaml
  - stacks/h-restic/compose.yaml                   # entry: runtime (engine)
  - stacks/h-gatus/compose.yaml

networks:
  edge:
    external: true   # h-proxy (caddy) <-> apps expostas
  internal:
    external: true   # apps <-> Postgres / Valkey
  dns:
    external: true   # adguard isolado
