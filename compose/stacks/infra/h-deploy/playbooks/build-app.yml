# build-app.yml — push à main de uma app monorepo.
#
# Disparado pelo hook `app-build`. Inputs (env vars do webhook):
#   DEPLOY_APP   nome do repo / app (ex.: "lyzer-monorepo")
#   DEPLOY_SHA   commit SHA do payload "after"
#
# Estado pretendido:
#   - source code em /workspace/<app> sincronizado com a SHA
#   - imagem lyzer/<app>:sha-<short> + :latest construídas
#   - container <service> recriado com a nova :latest
#   - imagens antigas além das 5 últimas SHAs pruned
#   - heartbeat ao Gatus enviado

- name: build & deploy app
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    app: "{{ lookup('env', 'DEPLOY_APP') | mandatory }}"
    sha: "{{ lookup('env', 'DEPLOY_SHA') | mandatory }}"
    short_sha: "{{ sha[:7] }}"
    repo_url: "git@github.com:lyzer/{{ app }}.git"
    workdir: "/workspace/{{ app }}"
    homed_path: /Users/eduvhc/homed
    image: "lyzer/{{ app }}"
    # Mapping repo → service (ajustar se nomes divergirem)
    service_map:
      lyzer-monorepo: lyzer-web-app
    service: "{{ service_map[app] | default(app + '-app') }}"

  tasks:

    - name: clone/pull do source à SHA exacta
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ workdir }}"
        version: "{{ sha }}"
        depth: 50
        force: true
        accept_hostkey: true

    - name: docker build com dupla tag + labels
      community.docker.docker_image_build:
        name: "{{ image }}"
        tag: "sha-{{ short_sha }}"
        path: "{{ workdir }}"
        rebuild: always
        labels:
          homed.deploy.sha: "{{ sha }}"
          homed.deploy.at: "{{ ansible_date_time.iso8601 | default('') }}"
      vars:
        ansible_python_interpreter: /usr/bin/python3

    - name: tag :latest a apontar para a SHA recém-construída
      community.docker.docker_image:
        name: "{{ image }}:sha-{{ short_sha }}"
        repository: "{{ image }}"
        tag: latest
        source: local
        force_tag: true

    - name: recreate só do service afectado (compose recalcula deps)
      community.docker.docker_compose_v2:
        project_src: "{{ homed_path }}/compose"
        services: ["{{ service }}"]
        state: present
        recreate: always
        wait: true

    - name: listar tags SHA da imagem (para prune)
      ansible.builtin.command:
        cmd: docker images {{ image }} --format {{ "'{{.Tag}}|{{.CreatedAt}}'" }} --filter "reference={{ image }}:sha-*"
      register: image_tags
      changed_when: false

    - name: prune — mantém só as 5 últimas tags SHA
      community.docker.docker_image:
        name: "{{ item.split('|')[0] }}"
        state: absent
      loop: "{{ image_tags.stdout_lines | sort(reverse=true) | map('regex_replace', '^', image + ':') | list }}"
      when: image_tags.stdout_lines | length > 5
      loop_control: { index_var: idx }
      vars:
        idx: 0

    - name: heartbeat OK ao Gatus
      ansible.builtin.uri:
        url: "http://h-gatus:8080/api/v1/endpoints/ops_deploy-{{ app }}/external?token={{ lookup('env', 'GATUS_TOKEN') }}&success=true"
        method: POST
        timeout: 5
        status_code: [200, 201, 204]
      failed_when: false
      when: lookup('env', 'GATUS_TOKEN') | length > 0

    - name: resumo
      ansible.builtin.debug:
        msg: "{{ image }}:sha-{{ short_sha }} + :latest · service {{ service }} restarted"

  handlers: []

  # Heartbeat de falha — invocado pelo rescue block
  pre_tasks: []
